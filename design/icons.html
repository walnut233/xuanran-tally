<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>理发店系统 - 图标库</title>
  <style>
    :root {
      --bg: oklch(98% 0.002 240);
      --surface: oklch(100% 0 0);
      --fg: oklch(18% 0.012 250);
      --muted: oklch(54% 0.012 250);
      --border: oklch(92% 0.005 250);
      --accent: oklch(58% 0.18 255);
      --font-body: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 12px;
      text-align: center;
    }

    .subtitle {
      color: var(--muted);
      text-align: center;
      margin-bottom: 48px;
      font-size: 14px;
    }

    .icons-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 32px;
      margin-bottom: 48px;
    }

    .icon-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      text-align: center;
    }

    .icon-display {
      width: 120px;
      height: 120px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      border-radius: 24px;
    }

    .icon-display svg {
      width: 64px;
      height: 64px;
    }

    .icon-name {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .icon-size {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 20px;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: var(--fg);
      color: var(--surface);
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .download-btn:hover {
      opacity: 0.9;
    }

    .download-all {
      text-align: center;
    }

    .download-all-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 40px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .download-all-btn:hover {
      opacity: 0.9;
    }

    .sizes-section {
      margin-top: 48px;
      padding-top: 48px;
      border-top: 1px solid var(--border);
    }

    .sizes-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 24px;
      text-align: center;
    }

    .size-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
      margin-bottom: 24px;
      padding: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .size-label {
      width: 100px;
      font-size: 14px;
      color: var(--muted);
      text-align: right;
    }

    .size-icons {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .size-icons svg {
      color: var(--fg);
    }

    .base64-section {
      margin-top: 48px;
      padding-top: 48px;
      border-top: 1px solid var(--border);
    }

    .base64-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 24px;
      text-align: center;
    }

    .base64-item {
      margin-bottom: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .base64-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .base64-name {
      font-weight: 600;
      font-size: 14px;
    }

    .copy-btn {
      padding: 6px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      background: var(--border);
    }

    .base64-content {
      padding: 16px 20px;
      font-family: ui-monospace, 'SF Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      word-break: break-all;
      max-height: 100px;
      overflow-y: auto;
      background: var(--bg);
    }
  </style>
</head>

    // 生成 Base64
    function generateBase64() {
      Object.keys(icons).forEach(key => {
        const svg = icons[key];
        const encoded = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
        document.getElementById(`base64-${key}`).textContent = encoded;
      });
    }

    // 复制 Base64
    function copyBase64(key) {
      const content = document.getElementById(`base64-${key}`).textContent;
      navigator.clipboard.writeText(content).then(() => {
        alert('已复制到剪贴板！');
      });
    }

    // 下载单个图标为 JPG
    function downloadIcon(name, format) {
      const svg = icons[name];
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      // 设置高分辨率
      const size = 256;
      canvas.width = size;
      canvas.height = size;

      // 白色背景
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, size, size);

      // 绘制 SVG
      const img = new Image();
      const svgBlob = new Blob([svg], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(svgBlob);

      img.onload = function() {
        // 居中绘制
        const drawSize = size * 0.6;
        const x = (size - drawSize) / 2;
        const y = (size - drawSize) / 2;

        // 黑色线条
        ctx.strokeStyle = '#1a1a1a';
        ctx.lineWidth = 2;
        ctx.drawImage(img, x, y, drawSize, drawSize);

        // 下载
        const link = document.createElement('a');
        link.download = `icon-${name}.jpg`;
        link.href = canvas.toDataURL('image/jpeg', 0.95);
        link.click();

        URL.revokeObjectURL(url);
      };

      img.src = url;
    }

    // 下载全部图标
    function downloadAll() {
      // 逐个下载
      ['home', 'member', 'recharge', 'consume', 'settings'].forEach((name, index) => {
        setTimeout(() => downloadIcon(name, 'jpg'), index * 300);
      });
    }

    // 初始化
    generateBase64();
  </script>
