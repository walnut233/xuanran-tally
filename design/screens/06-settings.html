<!doctype html>
<html lang="zh-CN"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>设置 - 理发店记卡系统</title>
  <style>
    :root {
      --bg: oklch(98% 0.004 240);
      --surface: oklch(100% 0 0);
      --fg: oklch(20% 0.02 240);
      --muted: oklch(50% 0.018 240);
      --border: oklch(90% 0.006 240);
      --accent: oklch(56% 0.12 170);
      --accent-light: oklch(90% 0.04 170);
      --danger: oklch(60% 0.18 25);
      --warning: oklch(70% 0.14 85);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      font-size: 14px;
      line-height: 1.4;
      height: 100vh;
      overflow: hidden;
    }

    /* Full screen layout */
    .app-container {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    /* Android status bar */
    .status-bar {
      height: 32px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      font-size: 12px;
      font-weight: 500;
      color: white;
    }

    /* App toolbar with back button */
    .app-toolbar {
      background: var(--accent);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: white;
      box-shadow: 0 2px 8px rgba(86, 184, 158, 0.2);
    }

    .back-button {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 12px;
      transition: background 0.2s;
    }
    .back-button svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .settings-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .settings-arrow svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .back-button:hover {
      background: rgba(255,255,255,0.15);
    }

    .toolbar-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    /* Content area - scrollable */
    .content {
      flex: 1;
      padding: 20px;
      padding-bottom: 24px;
      overflow-y: auto;
    }

    /* Section header */
    .section-header {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin: 18px 0 12px;
    }

    .section-header:first-child {
      margin-top: 0;
    }

    /* Settings group */
    .settings-group {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .settings-item {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: background 0.15s;
    }

    .settings-item:hover {
      background: var(--bg);
    }

    .settings-item:last-child {
      border-bottom: none;
    }

    .settings-label {
      font-weight: 500;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .settings-icon {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent-light);
      border-radius: 8px;
    }
    .settings-icon svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .info-icon {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .info-icon svg {
      width: 36px;
      height: 36px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .settings-value {
      color: var(--muted);
      margin-right: 8px;
      font-size: 14px;
    }

    .settings-arrow {
      color: var(--muted);
      font-size: 16px;
    }

    .settings-row {
      display: flex;
      align-items: center;
    }

    /* Toggle switch */
    .toggle {
      width: 52px;
      height: 30px;
      background: var(--border);
      border-radius: 15px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle.active {
      background: var(--accent);
    }

    .toggle::after {
      content: '';
      position: absolute;
      width: 26px;
      height: 26px;
      background: white;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.12);
      transition: left 0.2s;
    }

    .toggle.active::after {
      left: 24px;
    }

    /* Info card */
    .info-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px 20px;
      text-align: center;
      margin-bottom: 16px;
    }

    .info-icon {
      width: 76px;
      height: 76px;
      border-radius: 20px;
      margin: 0 auto 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      background: linear-gradient(135deg, var(--accent) 0%, oklch(62% 0.14 170) 100%);
      color: white;
    }

    .info-name {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .info-version {
      font-size: 14px;
      color: var(--muted);
    }

    /* Danger button */
    .danger-btn {
      width: 100%;
      height: 52px;
      background: var(--surface);
      color: var(--danger);
      border: 1px solid var(--danger);
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .danger-btn:hover {
      background: oklch(95% 0.02 25);
    }

    .danger-btn:active {
      background: oklch(90% 0.03 25);
    }

    /* Button styles for settings items */
    .btn-primary {
      background: var(--accent);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary:hover {
      background: oklch(52% 0.14 170);
    }

    .btn-warning {
      background: var(--warning);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-warning:hover {
      background: oklch(66% 0.16 85);
    }

    /* Status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: var(--accent-light);
      color: var(--accent);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
    }

    /* Divider text */
    .divider-text {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      margin: 16px 0;
      position: relative;
    }

    .divider-text::before,
    .divider-text::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 30%;
      height: 1px;
      background: var(--border);
    }

    .divider-text::before { left: 0; }
    .divider-text::after { right: 0; }
  </style>
</head>
