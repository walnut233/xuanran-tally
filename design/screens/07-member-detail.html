<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>会员详情 - 理发店记卡系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: oklch(98% 0.004 240);
      --surface: oklch(100% 0 0);
      --fg: oklch(20% 0.02 240);
      --muted: oklch(50% 0.018 240);
      --border: oklch(90% 0.006 240);
      --accent: oklch(56% 0.12 170);
      --accent-light: oklch(90% 0.04 170);
      --danger: oklch(60% 0.18 25);
      --warning: oklch(70% 0.12 85);
      --success: oklch(58% 0.16 145);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
    }
    .phone-frame {
      max-width: 390px;
      margin: 0 auto;
      background: var(--surface);
      min-height: 100vh;
      position: relative;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }
    .status-bar {
      height: 32px;
      background: var(--accent);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      color: white;
      font-size: 12px;
      font-weight: 500;
    }
    .header {
      background: var(--surface);
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .back-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--fg);
    }
    .back-btn:hover {
      background: var(--bg);
    }
    .back-btn svg, .edit-btn svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .header-title {
      font-size: 17px;
      font-weight: 600;
      flex: 1;
    }
    .edit-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--accent);
    }
    .record-icon {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .record-icon svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .edit-btn:hover {
      background: var(--accent-light);
    }
    .content {
      padding: 16px 20px;
      padding-bottom: 90px;
    }
    .member-header-card {
      background: linear-gradient(135deg, var(--accent) 0%, oklch(62% 0.14 170) 100%);
      border-radius: 20px;
      padding: 24px;
      color: white;
      margin-bottom: 16px;
    }
    .member-header-top {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }
    .member-avatar-large {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 600;
    }
    .member-header-info {
      flex: 1;
    }
    .member-header-name {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .member-header-phone {
      font-size: 15px;
      opacity: 0.9;
      margin-bottom: 4px;
    }
    .member-header-date {
      font-size: 13px;
      opacity: 0.75;
    }
    .balance-card {
      background: rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .balance-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .balance-label {
      font-size: 13px;
      opacity: 0.85;
    }
    .balance-value {
      font-size: 32px;
      font-weight: 700;
      line-height: 1;
    }
    .balance-unit {
      font-size: 16px;
      font-weight: 500;
    }
    .quick-actions {
      display: flex;
      gap: 10px;
    }
    .action-btn {
      flex: 1;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }
    .action-btn svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .action-btn.recharge {
      background: white;
      color: var(--accent);
    }
    .action-btn.consume {
      background: rgba(255,255,255,0.2);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
    }
    .action-btn:hover {
      transform: scale(1.02);
    }
    .info-section {
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .info-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .info-row {
      display: flex;
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    .info-row:last-child {
      border-bottom: none;
    }
    .info-label {
      width: 88px;
      font-size: 14px;
      color: var(--muted);
    }
    .info-value {
      flex: 1;
      font-size: 14px;
      font-weight: 500;
    }
    .record-tabs {
      display: flex;
      background: var(--bg);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 12px;
    }
    .record-tab {
      flex: 1;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .record-tab.active {
      background: var(--surface);
      color: var(--fg);
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    }
    .record-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .record-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .record-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .record-icon.recharge {
      background: var(--accent-light);
      color: var(--accent);
    }
    .record-icon.consume {
      background: oklch(95% 0.02 260);
      color: oklch(45% 0.14 260);
    }
    .record-info {
      flex: 1;
    }
    .record-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 3px;
    }
    .record-subtitle {
      font-size: 13px;
      color: var(--muted);
    }
    .record-amount {
      font-size: 15px;
      font-weight: 700;
    }
    .record-amount.plus {
      color: var(--accent);
    }
    .record-amount.minus {
      color: var(--danger);
    }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }
    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.5;
    }
    .empty-text {
      font-size: 14px;
    }
    .danger-zone {
      margin-top: 8px;
    }
    .danger-btn {
      width: 100%;
      height: 52px;
      background: transparent;
      border: 1px solid var(--danger);
      border-radius: 14px;
      color: var(--danger);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .danger-btn:hover {
      background: oklch(96% 0.02 25);
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="status-bar">
      <span>09:41</span>
      <span>📶 🔋</span>
    </div>

    <div class="header">
      <div class="back-btn" onclick="location.href='02-members.html'">
        <svg viewBox="0 0 24 24">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </div>
      <div class="header-title">会员详情</div>

        <svg viewBox="0 0 24 24">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>

      </div>
    </div>

    <div class="content">
      <div class="member-header-card">

          </div>
          <div class="info-row">

          </div>
          <div class="info-row">

          </div>
          <div class="info-row">
            <div class="info-label">开卡日期</div>
            <div class="info-value">2024年3月15日</div>

          <div class="info-row">
            <div class="info-label">备注</div>
            <div class="info-value">老顾客，每次剪短发</div>
          </div>
        </div>
      </div>

      <div class="info-section">
        <div class="section-title">历史记录</div>
        <div class="record-tabs">
          <div class="record-tab active">全部</div>
          <div class="record-tab">充值</div>
          <div class="record-tab">消费</div>
        </div>
        <div class="record-list">
          <div class="record-item">
            <div class="record-icon recharge">
              <svg viewBox="0 0 24 24">
                <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
                <line x1="1" y1="10" x2="23" y2="10"></line>
              </svg>
            </div>
            <div class="record-info">

              <div class="record-subtitle">2024年5月20日 · 现金 · 阿明</div>
            </div>
            <div class="record-amount plus">+10次</div>
          </div>
          <div class="record-item">
            <div class="record-icon consume">
              <svg viewBox="0 0 24 24">

            </div>
            <div class="record-info">
              <div class="record-title">剪发</div>
              <div class="record-subtitle">2024年5月18日 · 阿明</div>
            </div>
            <div class="record-amount minus">-1次</div>
          </div>
          <div class="record-item">
            <div class="record-icon consume">
              <svg viewBox="0 0 24 24">

                <line x1="4.5" y1="16" x2="2.5" y2="21.5"></line>
                <line x1="10" y1="17.5" x2="7" y2="21.5"></line>

            </div>
            <div class="record-info">
              <div class="record-title">剪发</div>
              <div class="record-subtitle">2024年5月5日 · 阿华</div>
            </div>

                <line x1="1" y1="10" x2="23" y2="10"></line>

          <div class="record-item">

              </svg>
            </div>
            <div class="record-info">
              <div class="record-title">染烫</div>
              <div class="record-subtitle">2024年4月10日 · 阿华</div>
            </div>
            <div class="record-amount minus">-2次</div>
          </div>
        </div>
      </div>

      <div class="info-section danger-zone">
        <button class="danger-btn">删除会员</button>
      </div>

  </div>
</body>
</html>
