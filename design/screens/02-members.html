<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>会员管理 - 理发店记卡系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: oklch(98% 0.004 240);
      --surface: oklch(100% 0 0);
      --fg: oklch(20% 0.02 240);
      --muted: oklch(50% 0.018 240);
      --border: oklch(90% 0.006 240);
      --accent: oklch(56% 0.12 170);
      --accent-light: oklch(90% 0.04 170);
      --danger: oklch(60% 0.18 25);
      --warning: oklch(70% 0.12 85);
      --success: oklch(58% 0.16 145);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
    }
    .phone-frame {
      max-width: 390px;
      margin: 0 auto;
      background: var(--surface);
      min-height: 100vh;
      position: relative;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }
    .status-bar {
      height: 32px;
      background: var(--accent);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      color: white;
      font-size: 12px;
      font-weight: 500;
    }
    .header {
      background: var(--surface);
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .search-bar {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .search-input {
      flex: 1;
      height: 44px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0 16px;
      font-size: 15px;
      outline: none;
      transition: all 0.2s;
    }
    .search-input:focus {
      border-color: var(--accent);
      background: white;
    }
    .content {
      padding: 16px 20px;
      padding-bottom: 90px;
    }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .section-count {
      font-size: 13px;
      color: var(--muted);
    }
    .member-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .member-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: all 0.2s;
      cursor: pointer;
    }
    .member-item:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 12px rgba(86, 184, 158, 0.1);
    }
    .member-avatar {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent) 0%, oklch(62% 0.14 170) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .member-info {
      flex: 1;
    }
    .member-name {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .member-phone {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .member-balance {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
    }
    .member-balance.low {
      color: var(--danger);
    }
    .member-arrow {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 16px;
    }
    .fab {
      position: fixed;
      bottom: 90px;
      right: 20px;
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--accent) 0%, oklch(62% 0.14 170) 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 28px;
      font-weight: 300;
      box-shadow: 0 8px 24px rgba(86, 184, 158, 0.35);
      z-index: 20;
      cursor: pointer;
      transition: all 0.2s;
    }
    .fab:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 28px rgba(86, 184, 158, 0.45);
    }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 390px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      padding: 8px 0 max(8px, env(safe-area-inset-bottom));
      z-index: 100;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 12px;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.2s;
      text-decoration: none;
    }
    .nav-item.active, .nav-item:hover {
      color: var(--accent);
    }
    .nav-item.active {
      background: var(--accent-light);
      border-radius: 12px;
      padding: 8px 12px;
    }
    .nav-item.active .nav-icon {
      transform: scale(1.1);
    }
    .nav-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-icon svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .fab {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .fab svg {
      width: 28px;
      height: 28px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .member-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .member-arrow svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .nav-label {
      font-size: 11px;
      font-weight: 500;
    }
  </style>
</head>
